spring:
  datasource:
    url: jdbc:h2:file:./backend/src/main/resources/data/demo
    username: sa
    password: sa
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate.ddl-auto: update #create
  h2:
    console:
      enabled: true

server:
  port: 8084
